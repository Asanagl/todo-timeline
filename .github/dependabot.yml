version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 10

  # Maintain dependencies for CMake
  - package-ecosystem: "cmake"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "cmake"
    commit-message:
      prefix: "build"
    open-pull-requests-limit: 10
