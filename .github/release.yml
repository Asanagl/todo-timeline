# Configuration for auto-generated release notes
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
      - bot
  categories:
    - title: Breaking Changes 🛠️
      labels:
        - breaking-change
        - major
    - title: New Features 🎉
      labels:
        - enhancement
        - feature
        - minor
    - title: Bug Fixes 🐛
      labels:
        - bug
        - bugfix
        - fix
        - patch
    - title: Documentation 📚
      labels:
        - documentation
        - docs
    - title: Dependencies 📦
      labels:
        - dependencies
        - deps
    - title: Other Changes
      labels:
        - "*"
