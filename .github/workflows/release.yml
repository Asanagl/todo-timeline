name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Qt via aqtinstall
      run: |
        pip install aqtinstall
        aqt install-qt windows desktop 6.7.2 win64_mingw -O ${{ github.workspace }}/Qt -m qtshadertools
        aqt install-tool windows desktop tools_mingw -O ${{ github.workspace }}/Qt

    - name: Set Qt environment
      shell: pwsh
      run: |
        $qtRoot = "${{ github.workspace }}/Qt/6.7.2/mingw_64"
        $mingwRoot = Get-ChildItem "${{ github.workspace }}/Qt/Tools/mingw*" | Select-Object -First 1
        echo "$qtRoot/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "$mingwRoot/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "Qt6_DIR=$qtRoot/lib/cmake/Qt6" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "CMAKE_PREFIX_PATH=$qtRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Configure CMake
      run: cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Collect & Pack
      shell: pwsh
      run: |
        $qtRoot = "${{ github.workspace }}/Qt/6.7.2/mingw_64"
        New-Item -ItemType Directory -Path deploy/TodoTimeline -Force
        Copy-Item build/TodoApp.exe deploy/TodoTimeline/

        # 复制 Qt DLL
        $dlls = @("Qt6Core.dll","Qt6Gui.dll","Qt6Qml.dll","Qt6Quick.dll","Qt6QuickControls2.dll",
                  "Qt6QuickTemplates2.dll","Qt6QmlModels.dll","Qt6QmlCore.dll","Qt6Network.dll",
                  "Qt6OpenGL.dll","Qt6Svg.dll","Qt6Widgets.dll","Qt6ShaderTools.dll")
        foreach ($dll in $dlls) {
          $src = Join-Path "$qtRoot/bin" $dll
          if (Test-Path $src) { Copy-Item $src deploy/TodoTimeline/ }
        }

        # MinGW runtime DLLs
        $mingwRoot = Get-ChildItem "${{ github.workspace }}/Qt/Tools/mingw*" | Select-Object -First 1
        foreach ($dll in @("libgcc_s_seh-1.dll","libstdc++-6.dll","libwinpthread-1.dll")) {
          $src = Join-Path "$mingwRoot/bin" $dll
          if (Test-Path $src) { Copy-Item $src deploy/TodoTimeline/ }
        }

        # 平台插件
        New-Item -ItemType Directory -Path deploy/TodoTimeline/platforms -Force
        Copy-Item "$qtRoot/plugins/platforms/qwindows.dll" deploy/TodoTimeline/platforms/

        # 样式插件
        if (Test-Path "$qtRoot/plugins/styles") {
          New-Item -ItemType Directory -Path deploy/TodoTimeline/styles -Force
          Copy-Item "$qtRoot/plugins/styles/*.dll" deploy/TodoTimeline/styles/ -ErrorAction SilentlyContinue
        }

        Compress-Archive -Path deploy/TodoTimeline -DestinationPath TodoTimeline-Windows-x64.zip

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-release
        path: TodoTimeline-Windows-x64.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Qt via aqtinstall
      run: |
        pip install aqtinstall
        aqt install-qt linux android 6.7.2 android_arm64_v8a -O ${{ github.workspace }}/Qt -m qtshadertools

    - name: Install Android SDK
      uses: android-actions/setup-android@v3

    - name: Set Qt environment
      run: |
        QT_ROOT="${{ github.workspace }}/Qt/6.7.2/android_arm64_v8a"
        echo "QT_ROOT=$QT_ROOT" >> $GITHUB_ENV
        echo "Qt6_DIR=$QT_ROOT/lib/cmake/Qt6" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=$QT_ROOT" >> $GITHUB_ENV
        echo "$QT_ROOT/bin" >> $GITHUB_PATH

    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_TOOLCHAIN_FILE=${{ env.QT_ROOT }}/lib/cmake/Qt6/qt.toolchain.cmake \
          -DQT_ANDROID_ABIS=arm64-v8a \
          -DCMAKE_BUILD_TYPE=Release \
          -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT

    - name: Build
      run: cmake --build build --config Release

    - name: Build APK
      run: |
        cd build
        androiddeployqt \
          --input android-TodoApp-deployment-settings.json \
          --output android-build \
          --apk TodoTimeline.apk

    - name: Upload Android artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-release
        path: build/android-build/outputs/**/*.apk

  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          windows-release/TodoTimeline-Windows-x64.zip
          android-release/**/*.apk
        prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
