name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Qt via aqtinstall
      run: |
        pip install aqtinstall
        aqt install-qt windows desktop 6.7.2 win64_msvc2019_64 -O ${{ github.workspace }}/Qt

    - name: Set Qt environment
      shell: pwsh
      run: |
        $qtRoot = "${{ github.workspace }}/Qt/6.7.2/msvc2019_64"
        echo "$qtRoot/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "Qt6_DIR=$qtRoot/lib/cmake/Qt6" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "CMAKE_PREFIX_PATH=$qtRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Deploy with windeployqt
      shell: pwsh
      run: |
        $qtRoot = "${{ github.workspace }}/Qt/6.7.2/msvc2019_64"
        New-Item -ItemType Directory -Path deploy/TodoTimeline -Force
        Copy-Item build/Release/TodoApp.exe deploy/TodoTimeline/
        & "$qtRoot/bin/windeployqt.exe" --qmldir qml deploy/TodoTimeline/TodoApp.exe
        Compress-Archive -Path deploy/TodoTimeline -DestinationPath TodoTimeline-Windows-x64.zip

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-release
        path: TodoTimeline-Windows-x64.zip

  build-android:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Qt via aqtinstall
      run: |
        pip install aqtinstall
        aqt install-qt linux desktop 6.6.3 gcc_64 -O ${{ github.workspace }}/Qt
        aqt install-qt linux android 6.6.3 android_arm64_v8a -O ${{ github.workspace }}/Qt

    - name: Install Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0'

    - name: Clean and reinstall Android platforms
      run: |
        # Remove ALL platforms (including broken ext variants) and reinstall only android-34
        rm -rf /usr/local/lib/android/sdk/platforms
        mkdir -p /usr/local/lib/android/sdk/platforms
        yes | sdkmanager --sdk_root=/usr/local/lib/android/sdk "platforms;android-34"
        echo "=== Installed platforms ==="
        ls -la /usr/local/lib/android/sdk/platforms/

    - name: Set Qt environment
      run: |
        QT_HOST_ROOT="${{ github.workspace }}/Qt/6.6.3/gcc_64"
        QT_ROOT="${{ github.workspace }}/Qt/6.6.3/android_arm64_v8a"
        echo "QT_ROOT=$QT_ROOT" >> $GITHUB_ENV
        echo "QT_HOST_PATH=$QT_HOST_ROOT" >> $GITHUB_ENV
        echo "Qt6_DIR=$QT_ROOT/lib/cmake/Qt6" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=$QT_ROOT" >> $GITHUB_ENV
        echo "$QT_ROOT/bin" >> $GITHUB_PATH
        echo "$QT_HOST_ROOT/bin" >> $GITHUB_PATH

    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_TOOLCHAIN_FILE=${{ env.QT_ROOT }}/lib/cmake/Qt6/qt.toolchain.cmake \
          -DQT_ANDROID_ABIS=arm64-v8a \
          -DQT_HOST_PATH=${{ env.QT_HOST_PATH }} \
          -DCMAKE_BUILD_TYPE=Release \
          -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
          -DQT_ANDROID_TARGET_SDK_VERSION=34 \
          -DQT_ANDROID_BUILD_TOOLS_REVISION=34.0.0

    - name: Build
      run: cmake --build build --config Release

    - name: Build APK
      run: |
        cd build
        androiddeployqt \
          --input android-TodoApp-deployment-settings.json \
          --output android-build \
          --apk TodoTimeline.apk

    - name: Upload Android artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-release
        path: build/android-build/outputs/**/*.apk

  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows]
    if: always()
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          windows-release/TodoTimeline-Windows-x64.zip
          android-release/**/*.apk
        prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
