name: Greetings

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome to Todo Timeline! 🎉
            
            Thank you for opening your first issue. We'll review it as soon as possible.
            
            In the meantime, please make sure you've:
            - Checked existing issues for duplicates
            - Provided a clear description of the problem
            - Included steps to reproduce (if applicable)
            
            Thanks for contributing!
          pr-message: |
            Welcome to Todo Timeline! 🎉
            
            Thank you for your first pull request! We'll review it as soon as possible.
            
            Please make sure you've:
            - Read the [Contributing Guide](https://github.com/yourusername/todo-timeline/blob/main/CONTRIBUTING.md)
            - Followed the code style guidelines
            - Added tests if applicable
            - Updated documentation if needed
            
            Thanks for contributing!
