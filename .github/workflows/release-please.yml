name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: false  # Disabled: using manual tag-based release.yml instead
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          package-name: todo-timeline
          extra-files: |
            CMakeLists.txt
