name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Qt via aqtinstall
      run: |
        pip install aqtinstall
        aqt install-qt windows desktop 6.7.2 win64_msvc2019_64 -O ${{ github.workspace }}/Qt -m qtshadertools

    - name: Set Qt environment
      shell: pwsh
      run: |
        $qtRoot = "${{ github.workspace }}/Qt/6.7.2/msvc2019_64"
        echo "$qtRoot/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "Qt6_DIR=$qtRoot/lib/cmake/Qt6" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "CMAKE_PREFIX_PATH=$qtRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: build/TodoApp.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Qt via aqtinstall
      run: |
        pip install aqtinstall
        aqt install-qt linux desktop 6.7.2 gcc_64 -O ${{ github.workspace }}/Qt -m qtshadertools

    - name: Set Qt environment
      run: |
        QT_ROOT="${{ github.workspace }}/Qt/6.7.2/gcc_64"
        echo "QT_ROOT=$QT_ROOT" >> $GITHUB_ENV
        echo "Qt6_DIR=$QT_ROOT/lib/cmake/Qt6" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=$QT_ROOT" >> $GITHUB_ENV
        echo "$QT_ROOT/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: build/TodoApp

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Qt via aqtinstall
      run: |
        pip install aqtinstall
        aqt install-qt linux desktop 6.7.2 gcc_64 -O ${{ github.workspace }}/Qt
        aqt install-qt linux android 6.7.2 android_arm64_v8a -O ${{ github.workspace }}/Qt -m qtshadertools

    - name: Install Android SDK
      uses: android-actions/setup-android@v3

    - name: Set Qt environment
      run: |
        QT_HOST_ROOT="${{ github.workspace }}/Qt/6.7.2/gcc_64"
        QT_ROOT="${{ github.workspace }}/Qt/6.7.2/android_arm64_v8a"
        echo "QT_ROOT=$QT_ROOT" >> $GITHUB_ENV
        echo "QT_HOST_PATH=$QT_HOST_ROOT" >> $GITHUB_ENV
        echo "Qt6_DIR=$QT_ROOT/lib/cmake/Qt6" >> $GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=$QT_ROOT" >> $GITHUB_ENV
        echo "$QT_ROOT/bin" >> $GITHUB_PATH
        echo "$QT_HOST_ROOT/bin" >> $GITHUB_PATH

    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_TOOLCHAIN_FILE=${{ env.QT_ROOT }}/lib/cmake/Qt6/qt.toolchain.cmake \
          -DQT_ANDROID_ABIS=arm64-v8a \
          -DQT_HOST_PATH=${{ env.QT_HOST_PATH }} \
          -DCMAKE_BUILD_TYPE=Release \
          -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT

    - name: Build
      run: cmake --build build --config Release

    - name: Build APK
      run: |
        cd build
        androiddeployqt \
          --input android-TodoApp-deployment-settings.json \
          --output android-build \
          --apk TodoApp.apk

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-build
        path: build/android-build/outputs/**/*.apk
