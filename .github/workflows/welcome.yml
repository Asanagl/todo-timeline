name: Welcome

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            ## Welcome to Todo Timeline! 🎉
            
            Thank you for opening your first issue! We appreciate your contribution.
            
            ### Before we start
            
            Please make sure you've:
            - [ ] Checked existing issues for duplicates
            - [ ] Provided a clear description of the problem
            - [ ] Included steps to reproduce (if applicable)
            - [ ] Specified your environment (OS, Qt version, etc.)
            
            ### What happens next?
            
            1. A maintainer will review your issue
            2. We may ask for additional information
            3. We'll work on a fix or provide guidance
            
            ### Need help?
            
            - Check the [Documentation](https://github.com/yourusername/todo-timeline#readme)
            - Join our [Discussions](https://github.com/yourusername/todo-timeline/discussions)
            - Read the [Contributing Guide](https://github.com/yourusername/todo-timeline/blob/main/CONTRIBUTING.md)
            
            Thanks for contributing! 🚀
          pr-message: |
            ## Welcome to Todo Timeline! 🎉
            
            Thank you for your first pull request! We're excited to have you as a contributor.
            
            ### Before we review
            
            Please make sure you've:
            - [ ] Read the [Contributing Guide](https://github.com/yourusername/todo-timeline/blob/main/CONTRIBUTING.md)
            - [ ] Followed the code style guidelines
            - [ ] Added tests if applicable
            - [ ] Updated documentation if needed
            - [ ] Added a meaningful commit message
            
            ### What happens next?
            
            1. Automated checks will run
            2. A maintainer will review your code
            3. We may request changes
            4. Once approved, your PR will be merged
            
            ### Need help?
            
            - Check the [Documentation](https://github.com/yourusername/todo-timeline#readme)
            - Join our [Discussions](https://github.com/yourusername/todo-timeline/discussions)
            - Ask questions in the PR comments
            
            Thanks for contributing! 🚀
